name: Publish to npm
on:
  push:
    tags: ['v*']
permissions:
  contents: read
  id-token: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      # OIDC trusted publishing (npmjs.com) is the auth path for this workflow.
      # setup-node's registry-url always writes an .npmrc referencing
      # ${NODE_AUTH_TOKEN}. Per npm docs, an undefined env var is left
      # unreplaced (a literal, bogus token) while a defined-but-empty var
      # substitutes cleanly to "" — so NODE_AUTH_TOKEN must stay defined as
      # an explicit empty string to let OIDC take over. If trusted publishing
      # isn't registered yet, this step fails with ENEEDAUTH until it is.
      # `prepare`/`prepublishOnly` build dist/ before publish.
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ''
