name: Publish to npm
on:
  push:
    tags: ['v*']
permissions:
  contents: read
  id-token: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      # OIDC trusted publishing is used automatically when configured on npmjs.com.
      # For the initial publish, add an NPM_TOKEN secret (Settings → Secrets → Actions).
      # `prepare`/`prepublishOnly` build dist/ before publish.
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
