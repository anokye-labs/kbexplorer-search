name: Auto-merge agent PRs

# Enables auto-merge on PRs created by recognized agent/bot accounts
# once they are opened. GitHub's auto-merge waits for all required status
# checks to pass before merging.
#
# Prerequisites:
#   1. "Allow auto-merge" must be enabled in repo Settings → General
#   2. Branch protection on main should require the CI status check

on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest

    # Only run for agent/bot authors
    if: >-
      github.event.pull_request.user.login == 'devin-ai-integration[bot]'
      || github.event.pull_request.user.login == 'copilot[bot]'
      || github.event.pull_request.user.login == 'github-actions[bot]'

    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --squash --repo ${{ github.repository }}
